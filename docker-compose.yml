services:
  db:
    image: mariadb:11
    container_name: family-dashboard-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3366:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  jow-scraper:
    build: ./services/jow-scraper
    container_name: family-dashboard-jow-scraper
    restart: unless-stopped
    environment:
      - PORT=8001
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    container_name: family-dashboard-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      REGISTRATION_SECRET: ${REGISTRATION_SECRET}
      REDIS_URL: ${REDIS_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      JOW_SCRAPER_URL: ${JOW_SCRAPER_URL:-http://jow-scraper:8001}
      POPOTE_UPLOAD_DIR: ${POPOTE_UPLOAD_DIR:-/uploads/popote}
      NEXT_PUBLIC_POPOTE_UPLOAD_BASE_URL: ${NEXT_PUBLIC_POPOTE_UPLOAD_BASE_URL:-/uploads/popote}
    ports:
      - "3010:3000"
    networks:
      - internal
    # Note : On ne met plus de volumes ici pour laisser Docker utiliser
    # les fichiers compilés à l'intérieur de l'image.
    command: >
          sh -c "npx prisma migrate deploy &&
                npm run prisma:seed &&
                node server.js"

networks:
  internal:
    driver: bridge

volumes:
  db_data: