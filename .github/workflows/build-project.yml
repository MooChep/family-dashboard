name: Deploy Production
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Server
        # Ici, on peut utiliser 'appleboy/ssh-action' pour pull le code sur ton serveur 
        # et lancer le build Docker en local sur la machine de prod.
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/moo/
            git pull origin main
            docker-compose build --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }}
            docker-compose up -d